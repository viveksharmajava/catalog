spring.application.name=playpro

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Datasource (H2 in-memory for local dev)
spring.datasource.url=jdbc:h2:mem:playpro;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# CORS for catalog-admin React app
catalog.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Product image file storage (local filesystem under project)
catalog.product-images.storage-path=data/product-images
catalog.product-images.public-base-url=http://localhost:8080

# Multipart uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

