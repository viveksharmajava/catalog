spring.application.name=playpro

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Datasource (H2 file-based for local dev — persists under ./data/)
spring.datasource.url=jdbc:h2:file:./data/playpro;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

# H2 web console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# CORS for catalog-admin React app
catalog.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Party service (authentication source of truth)
party.service.base-url=http://localhost:8082

# Product image file storage (local filesystem under project)
catalog.product-images.storage-path=data/product-images
catalog.product-images.public-base-url=http://localhost:8080

# Category and catalog image storage
catalog.media.public-base-url=http://localhost:8080
catalog.media.category-storage-path=data/category-images
catalog.media.catalog-storage-path=data/catalog-images

# Multipart uploads (product import)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# Pricing service (product price import/export)
pricing.service.base-url=http://localhost:8081

